schemaVersion: "1"
kind: agent
name: pi
displayName: Pi
description: Pi coding agent by Earendil Works.

agent:
  image: "docker/sandbox-templates:shell"
  aiFilename: AGENTS.md
  entrypoint:
    run: [pi]

network:
  allowedDomains:
    - "**"

commands:
  install:
    - command: "curl -fsSL https://pi.dev/install.sh | bash"
      user: "1000"
      description: Install Pi coding agent

agentContext: |
  ## Sandbox environment

  You are running inside a Docker sandbox. The workspace is mounted at
  its absolute host path. `sudo` is passwordless; use it for package
  installs.
